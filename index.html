<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordale!!</title>
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/footer.css" />
  </head>
  <body>
    <header>
      <div class="info-bar">
        <div class="info-bar__name">
          <img src="assets/3bar.svg" alt="" />
        </div>
        <div class="info-bar__icons">
          <div><img src="assets/bulb.svg" alt="" /></div>
          <div><img src="assets/bar.svg" alt="" /></div>
          <div><img src="assets/que.svg" alt="" /></div>
          <div><img src="assets/cog.svg" alt="" /></div>
          <div id="Games">Subscribe to Games</div>
        </div>
      </div>
    </header>

    <main>
      <div class="board-row row-0">
        <div class="board-block" date-index="00"></div>
        <div class="board-block" date-index="01"></div>
        <div class="board-block" date-index="02"></div>
        <div class="board-block" date-index="03"></div>
        <div class="board-block" date-index="04"></div>
      </div>
      <div class="board-row row-1">
        <div class="board-block" date-index="10"></div>
        <div class="board-block" date-index="11"></div>
        <div class="board-block" date-index="12"></div>
        <div class="board-block" date-index="13"></div>
        <div class="board-block" date-index="14"></div>
      </div>
      <div class="board-row row-2">
        <div class="board-block" date-index="20"></div>
        <div class="board-block" date-index="21"></div>
        <div class="board-block" date-index="22"></div>
        <div class="board-block" date-index="23"></div>
        <div class="board-block" date-index="24"></div>
      </div>
      <div class="board-row row-3">
        <div class="board-block" date-index="30"></div>
        <div class="board-block" date-index="31"></div>
        <div class="board-block" date-index="32"></div>
        <div class="board-block" date-index="33"></div>
        <div class="board-block" date-index="34"></div>
      </div>
      <div class="board-row row-4">
        <div class="board-block" date-index="40"></div>
        <div class="board-block" date-index="41"></div>
        <div class="board-block" date-index="42"></div>
        <div class="board-block" date-index="43"></div>
        <div class="board-block" date-index="44"></div>
      </div>
      <div class="board-row row-5">
        <div class="board-block" date-index="50"></div>
        <div class="board-block" date-index="51"></div>
        <div class="board-block" date-index="52"></div>
        <div class="board-block" date-index="53"></div>
        <div class="board-block" date-index="54"></div>
      </div>
    </main>

    <footer>
      <div class="keypad-board board-0">
        <div class="pad-block" date-key="Q">Q</div>
        <div class="pad-block" date-key="W">W</div>
        <div class="pad-block" date-key="E">E</div>
        <div class="pad-block" date-key="R">R</div>
        <div class="pad-block" date-key="T">T</div>
        <div class="pad-block" date-key="Y">Y</div>
        <div class="pad-block" date-key="U">U</div>
        <div class="pad-block" date-key="I">I</div>
        <div class="pad-block" date-key="O">O</div>
        <div class="pad-block" date-key="P">P</div>
      </div>
      <div class="keypad-board board-1">
        <div class="pad-block" date-key="A">A</div>
        <div class="pad-block" date-key="S">S</div>
        <div class="pad-block" date-key="D">D</div>
        <div class="pad-block" date-key="F">F</div>
        <div class="pad-block" date-key="G">G</div>
        <div class="pad-block" date-key="H">H</div>
        <div class="pad-block" date-key="J">J</div>
        <div class="pad-block" date-key="K">K</div>
        <div class="pad-block" date-key="L">L</div>
      </div>
      <div class="keypad-board board-2">
        <div id="block" class="pad-block">ENTER</div>
        <div class="pad-block" date-key="Z">Z</div>
        <div class="pad-block" date-key="X">X</div>
        <div class="pad-block" date-key="C">C</div>
        <div class="pad-block" date-key="V">V</div>
        <div class="pad-block" date-key="B">B</div>
        <div class="pad-block" date-key="N">N</div>
        <div class="pad-block" date-key="M">M</div>
        <div id="block" class="pad-block">
          <img src="assets/back.svg" alt="" />
        </div>
      </div>
    </footer>
  </body>
</html>
